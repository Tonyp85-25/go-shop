# yaml-language-server: $schema=https://taskfile.dev/schema.json
# important! yaml does not tolerate "{" after hyphen,
# so you are forced to wrap your text beginning with a variable with ""
version: '3'

set: [errexit, nounset, pipefail]

dotenv:
  - .env

vars:
  DB_STRING: "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?sslmode=$DB_SSLMODE"
  PRE_BIN: "devbox run"

tasks:
  setup:
    desc: Setup project
    deps:
      - gen-local
      - devbox install  #install dev dependency
      - "{{.PRE_BIN} lefthook install" # install git hooks

  gen-local:
    desc: Generate local task file (not commited)
    cmds:
      - cp ./taskfile.dist.yml ./Taskfile.yml
      - cp .env-example .env

  build:
    desc: Build app
    cmds:
      - "{{.PRE_BIN}} go build -o bin/app ./cmd/api"
    silent: true

  run:
    cmds:
      - "{{.PRE_BIN}} go run ./cmd/api"

  dev:
    cmds:
      - "{{.PRE_BIN}} go run ./cmd/api"

  lint:
    deps:
      - format
    cmds:
      - "{{.PRE_BIN}} golangci-lint run ./..."
      - "{{.PRE_BIN}} yamllint ."

  format:
    cmds:
      - "{{.PRE_BIN}} gofmt -s -w ."
      - "{{.PRE_BIN}} goimports -w ."

  test:all:
    cmds:
      - "export DOCKER_HOST=unix:///$DOCKER_PATH/docker.sock && {{.PRE_BIN}} go test -v ./internal/tests/..."
  test:integration:
    cmds:
      - "export DOCKER_HOST=unix:///$DOCKER_PATH/docker.sock && {{.PRE_BIN}} go test -v ./internal/tests/integration/..."
  test:unit:
    cmds:
      - "{{.PRE_BIN}} go test -v ./internal/tests/unit/..."

  migrate:gen:
    desc: |
      create migration set with name passed as param
      task migrate-gen -- <name>
    cmds:
      - "{{.PRE_BIN}} migrate create -ext sql -dir db/migrations {{.CLI_ARGS}}"

  migrate:up:
    cmds:
      - "{{.PRE_BIN}} migrate -path db/migrations -database {{.DB_STRING}} up {{.CLI_ARGS}}"

  migrate:down:
    cmds:
      - "{{.PRE_BIN}} migrate -path db/migrations -database {{.DB_STRING}} down {{.CLI_ARGS}}"
  migrate:version:set:
    cmds:
      - "{{.PRE_BIN}} migrate -path db/migrations -database {{.DB_STRING}} force {{.CLI_ARGS}}"

  container:up:
    cmds:
      - docker compose -f docker/docker-compose.yml  up -d
  container:down:
    cmds:
      - docker compose -f docker/docker-compose.yml  down

  # generation commands
  add-feature:
    desc: Add a new feature template (write your feature name after "-- ")
    env:
      FEATURE_PATH: "${pwd}/internal/featuress/{{.CLI_ARGS}}"
    cmds:
      - mkdir -p $FEATURE_PATH
      - |
       touch $FEATURE_PATH/usecase.go $FEATURE_PATH/request.go
       $FEATURE_PATH/response.go $FEATURE_PATH/handler.go
