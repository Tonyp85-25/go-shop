# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

set: [errexit, nounset, pipefail]

dotenv:
  - .env

vars:
  DB_STRING: "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?sslmode=$DB_SSLMODE"

tasks:
  setup:
    desc: Setup project
    deps:
      - gen-local
      - devbox install
  gen-local:
    desc: Generate local task file (not commited)
    cmds:
      - cp ./taskfile.dist.yml ./Taskfile.yml
      - cp .env-example .env
  build:
    desc: Build app
    cmds:
      - devbox run go build -o bin/app ./cmd/api
    silent: true
  run:
    cmds:
      - devbox run go run ./cmd/api
  dev:
    cmds:
      - devbox run go run ./cmd/api
  lint:
    deps:
      - format
    cmds:
      - devbox run golangci-lint run ./...
  format:
    cmds:
      -  devbox run gofmt -s -w .
      -  devbox run goimports -w .
  migrate-up:
    cmds:
      - migrate -path db/migrations -database "{{.DB_STRING}" up
  migrate-down:
    cmds:
      - migrate -path db/migrations -database "{{.DB_STRING}" up

  container-up:
    cmds :
      - docker compose -f docker/docker-compose.yml  up -d
  container-down:
    cmds:
      - docker compose -f docker/docker-compose.yml  down
